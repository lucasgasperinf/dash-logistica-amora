<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logística — Amora</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --v:#8B1A2B;--vd:#6B0F1F;--vs:#A93444;
  --o:#D4A24A;--os:#E8C57A;
  --c:#F5EFE0;--cd:#EBE0C8;
  --ch:#2A1A1C;--i:#4A3338;--n:#FBF7EE;--w:#FFFFFF;
  --bd:rgba(235,224,200,0.7);
  --sh:0 1px 2px rgba(42,26,28,.04),0 8px 24px -12px rgba(42,26,28,.12);
  --she:0 4px 12px rgba(42,26,28,.08),0 24px 48px -16px rgba(42,26,28,.18);
}
body{font-family:'Inter Tight',-apple-system,sans-serif;background:var(--c);color:var(--ch);min-height:100vh;}

/* LOGIN */
#tela-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--c);}
.login-card{width:360px;background:var(--w);border-radius:20px;padding:44px 36px;box-shadow:var(--she);border:1px solid var(--bd);}
.login-topo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px;}
.login-badge{width:58px;height:58px;background:var(--v);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--o);}
.login-marca{font-family:'Fraunces',serif;font-size:24px;font-weight:500;color:var(--v);letter-spacing:-.02em;text-align:center;}
.login-setor{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--i);opacity:.55;text-align:center;margin-top:2px;}
.login-sub{font-size:12px;color:var(--i);opacity:.45;text-align:center;margin-bottom:24px;}
.campo{margin-bottom:14px;}
.campo label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--i);opacity:.6;margin-bottom:6px;}
.campo input{width:100%;padding:11px 13px;border:1px solid var(--cd);border-radius:9px;font-family:inherit;font-size:14px;background:var(--n);color:var(--ch);outline:none;transition:border-color .15s,background .15s;}
.campo input:focus{border-color:var(--o);background:var(--w);}
.login-erro{font-size:12px;color:#B52845;background:#F5E8EE;padding:8px 12px;border-radius:8px;text-align:center;margin-bottom:12px;}
.btn-entrar{width:100%;padding:13px;background:var(--v);color:var(--w);font-family:inherit;font-size:14px;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:background .2s,transform .15s;margin-top:4px;}
.btn-entrar:hover{background:var(--vd);transform:translateY(-1px);}
.btn-entrar:disabled{opacity:.65;cursor:wait;transform:none;}

/* HEADER */
.header{background:var(--v);padding:0 2rem;height:64px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.logo{width:36px;height:36px;background:var(--o);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--v);flex-shrink:0;}
.header h1{font-family:'Fraunces',serif;font-size:20px;font-weight:500;color:#fff;margin-left:11px;letter-spacing:-.02em;}
.header h1 span{color:var(--os);}
.hl{display:flex;align-items:center;flex-shrink:0;}
.hc{flex:1;display:flex;justify-content:center;}
.hr{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.period-tabs{display:flex;background:rgba(255,255,255,.12);border-radius:8px;padding:3px;gap:2px;}
.period-tab{padding:5px 14px;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,.65);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.period-tab.active{background:var(--o);color:var(--v);font-weight:600;}
.sync{font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;white-space:nowrap;transition:all .2s;}
.sync-ok{background:rgba(90,160,70,.2);color:#9FE880;}
.sync-saving{background:rgba(220,180,60,.2);color:#FFD878;}
.sync-erro{background:rgba(220,80,80,.2);color:#FF9A9A;}
.relogio{font-size:11px;color:rgba(255,255,255,.55);text-align:right;line-height:1.4;}
.relogio strong{color:rgba(255,255,255,.9);display:block;font-size:12px;}
.user-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border-radius:99px;padding:4px 12px 4px 4px;}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--o);color:var(--v);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.user-chip span{font-size:12px;color:rgba(255,255,255,.85);font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-sair{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-family:inherit;font-size:12px;padding:5px 12px;border-radius:8px;cursor:pointer;transition:all .15s;}
.btn-sair:hover{background:rgba(255,255,255,.18);color:#fff;}

/* MAIN */
.main{padding:1.25rem 2rem 2.5rem;}
.nav-data{display:flex;align-items:center;gap:12px;margin-bottom:1.1rem;}
.nav-data button{background:var(--w);border:1px solid var(--bd);color:var(--i);font-family:inherit;font-size:12px;padding:5px 12px;border-radius:8px;cursor:pointer;transition:all .15s;box-shadow:var(--sh);}
.nav-data button:hover:not(:disabled){border-color:var(--v);color:var(--v);}
.nav-data button:disabled{opacity:.4;cursor:default;}
.nav-data span{font-family:'Fraunces',serif;font-size:15px;font-weight:500;color:var(--v);}

/* SUMMARY BAR */
.summary-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:1.1rem;}
.sum-card{background:var(--w);border:1px solid var(--bd);border-top:3px solid var(--sc);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:box-shadow .15s,transform .15s;box-shadow:var(--sh);}
.sum-card:hover{box-shadow:var(--she);transform:translateY(-1px);}
.sum-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.sum-nome{font-size:10px;color:var(--i);font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.55;}
.sum-status{font-size:12px;font-weight:600;margin-top:2px;color:var(--sc);}

/* TABS */
.setor-tabs{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:1.1rem;flex-wrap:wrap;}
.setor-tab{display:flex;align-items:center;gap:6px;padding:9px 15px;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--i);opacity:.5;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;border-radius:8px 8px 0 0;transition:all .15s;}
.setor-tab.active{color:var(--stc);opacity:1;border-bottom-color:var(--stc);background:var(--stbg);}
.setor-tab:hover:not(.active){opacity:.75;background:rgba(0,0,0,.03);}
.setor-panel{display:none;}
.setor-panel.active{display:block;}

/* CARDS */
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--i);opacity:.55;margin:0 0 10px;padding-left:10px;border-left:3px solid var(--slc);}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:1.1rem;}
.kpi-card{background:var(--w);border:1px solid var(--bd);border-radius:12px;padding:16px;box-shadow:var(--sh);}
.kpi-tipo{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--i);opacity:.45;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.kpi-tipo::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ktc);flex-shrink:0;}
.kpi-nome{font-size:12px;color:var(--i);margin-bottom:9px;line-height:1.4;opacity:.8;}
.kpi-card input{font-family:'Fraunces',serif;font-size:28px;font-weight:500;color:var(--ch);width:100%;border:none;border-bottom:2px solid var(--bd);background:transparent;padding:0 0 3px;outline:none;transition:border-color .15s;}
.kpi-card input:focus{border-bottom-color:var(--ktc);}
.kpi-unit{font-size:11px;color:var(--i);opacity:.45;margin-top:5px;}
.setor-title{font-family:'Fraunces',serif;font-size:15px;font-weight:500;color:var(--stc);margin:1.25rem 0 .75rem;padding-left:12px;border-left:4px solid var(--stc);}
.rank-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.1rem;}
.rank-card{background:var(--w);border:1px solid var(--bd);border-radius:12px;padding:16px 12px;text-align:center;box-shadow:var(--sh);}
.rank-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin:0 auto 8px;}
.rank-nome{font-size:12px;color:var(--i);opacity:.7;margin-bottom:8px;font-weight:500;}
.rank-card input{font-family:'Fraunces',serif;font-size:26px;font-weight:500;color:var(--ch);width:80px;border:none;border-bottom:2px solid var(--bd);background:transparent;outline:none;text-align:center;}
.rank-unit{font-size:11px;color:var(--i);opacity:.45;margin-top:5px;}
.rank-pos{font-size:12px;font-weight:600;margin-top:6px;min-height:18px;}
.total-card{background:var(--w);border:1px solid var(--bd);border-top:3px solid var(--stc);border-radius:12px;padding:16px 18px;box-shadow:var(--sh);}
.total-val{font-family:'Fraunces',serif;font-size:34px;font-weight:500;}

/* EQUIPE */
.eq-table{width:100%;border-collapse:collapse;font-size:13px;}
.eq-table th{padding:10px 14px;text-align:center;color:var(--os);font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;background:var(--v);}
.eq-table th:first-child{text-align:left;border-radius:8px 0 0 0;}
.eq-table th:last-child{border-radius:0 8px 0 0;}
.eq-table td{padding:9px 14px;border-bottom:.5px solid var(--bd);}
.eq-table tr:nth-child(even) td{background:var(--n);}
.eq-table tr:nth-child(odd) td{background:var(--w);}
.eq-sel{font-family:inherit;font-size:12px;font-weight:600;border:1px solid var(--bd);border-radius:8px;padding:5px 9px;cursor:pointer;outline:none;transition:all .15s;}
.eq-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--v);background:var(--c);flex-shrink:0;}
.eq-resumo{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:1rem;}
.eq-cnt{background:var(--w);border:1px solid var(--bd);border-radius:12px;padding:14px 15px;text-align:center;box-shadow:var(--sh);}
.eq-cnt-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--i);opacity:.55;margin-bottom:6px;}
.eq-cnt-val{font-family:'Fraunces',serif;font-size:28px;font-weight:500;}

/* IMPORT */
.import-area{background:var(--w);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:1.1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:var(--sh);}
.btn-imp{display:inline-flex;align-items:center;gap:8px;background:var(--v);color:var(--w);padding:8px 18px;border-radius:99px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;border:none;transition:background .2s;}
.btn-imp:hover{background:var(--vd);}
.btn-limpar{padding:6px 13px;border:1px solid var(--bd);border-radius:99px;background:transparent;font-family:inherit;font-size:12px;cursor:pointer;color:var(--i);opacity:.6;transition:all .15s;}
.btn-limpar:hover{border-color:var(--v);color:var(--v);opacity:1;}
.alerta-box{font-size:11px;color:var(--i);margin-top:8px;padding:8px 12px;background:var(--c);border-radius:8px;opacity:.75;}

/* HISTÓRICO */
.hist-filtros{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.hist-filtros select,.hist-filtros input[type=date]{font-family:inherit;font-size:12px;padding:6px 10px;border:1px solid var(--bd);border-radius:8px;background:var(--w);color:var(--ch);outline:none;cursor:pointer;}
.hist-filtros select:focus,.hist-filtros input:focus{border-color:var(--v);}
.hist-filtros label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.55;}
.btn-lf{padding:6px 12px;border:1px solid var(--bd);border-radius:8px;background:transparent;font-family:inherit;font-size:12px;cursor:pointer;color:var(--i);opacity:.6;transition:all .15s;}
.btn-lf:hover{border-color:var(--v);color:var(--v);opacity:1;}
.hist-wrap{background:var(--w);border:1px solid var(--bd);border-radius:12px;overflow:hidden;box-shadow:var(--sh);}
.hist-head{display:grid;grid-template-columns:120px 75px 105px 1fr 155px 34px;gap:8px;padding:9px 16px;background:var(--cd);border-bottom:1px solid var(--bd);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--i);opacity:.6;}
.hist-item{display:grid;grid-template-columns:120px 75px 105px 1fr 155px 34px;align-items:center;gap:8px;padding:10px 16px;border-bottom:.5px solid var(--bd);font-size:12px;transition:background .1s;}
.hist-item:last-child{border-bottom:none;}
.hist-item:hover{background:var(--n);}
.hist-ts{color:var(--i);opacity:.55;font-size:11px;white-space:nowrap;}
.hist-user{font-weight:600;color:var(--v);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hist-secao{font-size:11px;font-weight:500;color:var(--i);}
.hist-campo{color:var(--i);opacity:.65;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hist-change{display:flex;align-items:center;gap:5px;font-size:11px;}
.hist-old{text-decoration:line-through;opacity:.45;}
.hist-seta{opacity:.35;font-size:10px;}
.hist-new{font-weight:600;color:var(--v);}
.hist-del{width:28px;height:28px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--i);opacity:.35;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;flex-shrink:0;}
.hist-del:hover{background:#FCEBEB;border-color:#791F1F;color:#791F1F;opacity:1;}
.hist-vazio{padding:48px;text-align:center;color:var(--i);opacity:.4;font-size:13px;}

@media(max-width:1200px){.summary-bar{grid-template-columns:repeat(3,1fr);}}
@media(max-width:900px){.hist-head,.hist-item{grid-template-columns:100px 65px 1fr 34px;}.hist-campo,.hist-change{display:none;}}
@media(max-width:700px){.summary-bar{grid-template-columns:1fr 1fr;}.header{flex-wrap:wrap;height:auto;padding:12px 1rem;gap:8px;}.hc{order:3;width:100%;}.main{padding:1rem 1rem 2rem;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="tela-login">
  <div class="login-card">
    <div class="login-topo">
      <div class="login-badge">AM</div>
      <div>
        <div class="login-marca">Amora</div>
        <div class="login-setor">Logística</div>
      </div>
    </div>
    <p class="login-sub">Painel de indicadores operacionais</p>
    <form onsubmit="fazerLogin(event)">
      <div class="campo"><label>Email</label><input type="email" id="l-email" placeholder="seu@amoradistribuidora.com.br" required></div>
      <div class="campo"><label>Senha</label><input type="password" id="l-senha" placeholder="••••••••" required></div>
      <div id="l-erro" class="login-erro" style="display:none"></div>
      <button type="submit" id="l-btn" class="btn-entrar">Entrar</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header class="header">
    <div class="hl"><div class="logo">AM</div><h1>Logística <span>— Amora</span></h1></div>
    <div class="hc">
      <div class="period-tabs">
        <button class="period-tab active" onclick="setPeriod(this)">Diário</button>
        <button class="period-tab" onclick="setPeriod(this)">Semanal</button>
        <button class="period-tab" onclick="setPeriod(this)">Mensal</button>
      </div>
    </div>
    <div class="hr">
      <div id="sync-badge" class="sync sync-ok">✓ Salvo</div>
      <div class="relogio"><strong id="hora"></strong><span id="data-exib"></span></div>
      <div class="user-chip"><div class="user-av" id="user-av">?</div><span id="user-nome">—</span></div>
      <button class="btn-sair" onclick="fazerLogout()">Sair</button>
    </div>
  </header>
  <main class="main">
    <div class="nav-data">
      <button onclick="navData(-1)">← Anterior</button>
      <span id="data-label"></span>
      <button onclick="navData(1)" id="btn-prox">Próximo →</button>
    </div>
    <div class="summary-bar" id="summary-bar"></div>
    <div class="setor-tabs" id="setor-tabs"></div>
    <div id="setores-container"></div>
  </main>
</div>

<script>
// ─── SUPABASE ─────────────────────────────────────────────────────────────────
var sb = window.supabase.createClient(
  'https://kxbgqpgfqlshegrzjmbh.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4YmdxcGdmcWxzaGVncnpqbWJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTk0MjIsImV4cCI6MjA5Mzc3NTQyMn0.mCeNoCiIx9U-W_f9KSLuznBqMlFe4oxs8yzbqGN4Cwg'
);

// ─── ESTADO ───────────────────────────────────────────────────────────────────
var V = {};
var ativo = 0;
var periodoAtivo = 'Diário';
var usuarioAtual = null;
var dataAtual = hoje();
var timerSalvar = null;
var _logPrev = {};
var _logTimer = {};
var histLogs = [];
var histFiltroSecao = '';
var histFiltroData = '';

function hoje() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function fazerLogin(e) {
  e.preventDefault();
  var email = document.getElementById('l-email').value;
  var senha = document.getElementById('l-senha').value;
  var btn = document.getElementById('l-btn');
  var erro = document.getElementById('l-erro');
  btn.textContent = 'Entrando...'; btn.disabled = true; erro.style.display = 'none';
  var res = await sb.auth.signInWithPassword({ email: email, password: senha });
  if (res.error) {
    erro.textContent = 'Email ou senha incorretos.';
    erro.style.display = 'block';
    btn.textContent = 'Entrar'; btn.disabled = false;
    return;
  }
  usuarioAtual = res.data.user;
  mostrarApp();
}

async function fazerLogout() {
  await sb.auth.signOut();
  usuarioAtual = null; V = {};
  document.getElementById('app').style.display = 'none';
  document.getElementById('tela-login').style.display = 'flex';
}

function mostrarApp() {
  document.getElementById('tela-login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  var nome = usuarioAtual.email.split('@')[0];
  document.getElementById('user-nome').textContent = nome;
  document.getElementById('user-av').textContent = nome[0].toUpperCase();
  dataAtual = hoje();
  atualizarDataLabel();
  carregarDados(dataAtual);
}

// ─── NAVEGAÇÃO DE DATA ────────────────────────────────────────────────────────
function atualizarDataLabel() {
  var d = new Date(dataAtual + 'T12:00:00');
  document.getElementById('data-label').textContent = d.toLocaleDateString('pt-BR', {weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('btn-prox').disabled = (dataAtual >= hoje());
}

function navData(delta) {
  var d = new Date(dataAtual + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  var nova = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  if (nova > hoje()) return;
  dataAtual = nova; V = {};
  atualizarDataLabel();
  carregarDados(dataAtual);
}

// ─── SYNC / SAVE ──────────────────────────────────────────────────────────────
function setSyncState(estado) {
  var el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync sync-' + estado;
  el.textContent = estado==='ok' ? '✓ Salvo' : estado==='saving' ? '⏳ Salvando...' : '⚠ Erro de conexão';
}

function agendarSalvar() {
  setSyncState('saving');
  if (timerSalvar) clearTimeout(timerSalvar);
  timerSalvar = setTimeout(salvarDados, 1200);
}

async function salvarDados() {
  if (!usuarioAtual) return;
  try {
    var res = await sb.from('daily_records').upsert({
      date: dataAtual, user_id: usuarioAtual.id, data: V,
      updated_at: new Date().toISOString()
    }, { onConflict: 'date,user_id' });
    setSyncState(res.error ? 'erro' : 'ok');
  } catch(e) { setSyncState('erro'); }
}

async function carregarDados(data) {
  setSyncState('saving');
  if (!usuarioAtual) return;
  try {
    var res = await sb.from('daily_records').select('data').eq('date', data).eq('user_id', usuarioAtual.id).maybeSingle();
    V = (res.data && res.data.data) ? res.data.data : {};
  } catch(e) { V = {}; }
  setSyncState('ok');
  renderSummary(); renderTabs(); renderPanel();
}

function getCampoMeta(id) {
  if (NOMES_CAMPOS[id]) return [PREF_SECAO[id.split('_')[0]] || id.split('_')[0], NOMES_CAMPOS[id]];
  if (id.indexOf('_resp') !== -1) return ['Organização','Responsável tarefa'];
  if (id.indexOf('_status') !== -1) return ['Organização','Status tarefa'];
  return [PREF_SECAO[id.split('_')[0]] || 'Geral', id];
}

async function logAtividade(id, velho, novo) {
  if (!usuarioAtual) return;
  if (String(velho||'') === String(novo||'')) return;
  var meta = getCampoMeta(id);
  try {
    await sb.from('activity_log').insert({
      user_id: usuarioAtual.id,
      user_nome: usuarioAtual.email.split('@')[0],
      secao: meta[0], campo_id: id, campo_nome: meta[1],
      valor_anterior: String(velho||''), valor_novo: String(novo||''),
      data_ref: dataAtual
    });
  } catch(e) { console.warn('log:', e); }
}

async function excluirLog(id) {
  if (!confirm('Excluir este registro do histórico?\n\nUse apenas para corrigir lançamentos incorretos (dedo gordo).')) return;
  var res = await sb.from('activity_log').update({ excluido_em: new Date().toISOString() }).eq('id', id);
  if (!res.error) {
    var el = document.getElementById('hlog-'+id);
    if (el) el.remove();
    histLogs = histLogs.filter(function(l){ return l.id !== id; });
    if (!histLogs.length) {
      var lista = document.getElementById('hist-lista');
      if (lista) lista.innerHTML = '<div class="hist-vazio">Nenhum registro encontrado.</div>';
    }
  }
}

// ─── ATUALIZAÇÃO DE DADOS ─────────────────────────────────────────────────────
function upd(id, val) {
  if (!_logPrev.hasOwnProperty(id)) _logPrev[id] = V[id] || '';
  V[id] = val;
  agendarSalvar();
  if (_logTimer[id]) clearTimeout(_logTimer[id]);
  _logTimer[id] = setTimeout(function() {
    var ant = _logPrev[id]; var atu = V[id] || '';
    if (String(ant) !== String(atu)) logAtividade(id, ant, atu);
    delete _logPrev[id]; delete _logTimer[id];
  }, 1500);
  if (id==='sep_dia'||id==='sep_t1'||id==='sep_t2'||id==='sep_altera') calcPctFaltas();
  if (id==='conf_dia'||id==='conf_t1'||id==='conf_t2'||id==='conf_erro') calcPctConf();
}

function updSep(inp){ upd(inp.id.replace('inp_',''), inp.value); }
function updConf(inp){ upd(inp.id.replace('inp_',''), inp.value); }

function selBg(v){ return v==='Presente'||v==='Conforme'?'#EAF3DE':v==='Ausente'||v==='Nao conforme'?'#FCEBEB':v==='Atrasado'?'#FAEEDA':'var(--w)'; }
function selColor(v){ return v==='Presente'||v==='Conforme'?'#27500A':v==='Ausente'||v==='Nao conforme'?'#791F1F':v==='Atrasado'?'#633806':'var(--i)'; }

function updSel(sel) {
  var v = sel.value; sel.style.background = selBg(v); sel.style.color = selColor(v);
  var id = sel.id.replace('inp_',''); var ant = V[id] || '';
  V[id] = v; agendarSalvar();
  if (String(ant) !== String(v)) logAtividade(id, ant, v);
  calcEqResumo();
}

function updOrgStatus(sel) {
  var v = sel.value;
  sel.style.background = v==='Feito'?'#EAF3DE':v==='Não feito'?'#FCEBEB':'var(--w)';
  sel.style.color = v==='Feito'?'#27500A':v==='Não feito'?'#791F1F':'var(--i)';

  }

}

// ─── CÁLCULOS ─────────────────────────────────────────────────────────────────
function calcRec() {
  var el = document.getElementById('rec_total'), lbl = document.getElementById('rec_sem_label');
  if (!el) return;
  var a = V['rec_chegada'], b = V['rec_armazen'];
  if (a && b) {
    var p1=a.split(':'), p2=b.split(':');
    var d=(parseInt(p2[0])*60+parseInt(p2[1]))-(parseInt(p1[0])*60+parseInt(p1[1]));
    if (d<0) d+=1440;
    el.textContent=d;
    var cor=d<=360?'#27500A':d<=1440?'#633806':'#791F1F';
    var bg=d<=360?'#EAF3DE':d<=1440?'#FAEEDA':'#FCEBEB';
    var lbx=d<=360?'✅ Ótimo':d<=1440?'⚠️ Atenção':'❌ Fora da meta';
    el.style.color=cor;
    if(lbl){lbl.textContent=lbx;lbl.style.background=bg;lbl.style.color=cor;}
  } else {
    el.textContent='—'; el.style.color='var(--i)';
    if(lbl){lbl.textContent='—';lbl.style.background='var(--c)';lbl.style.color='var(--i)';}
  }
}

function calcPctFaltas() {
  var dia=parseFloat(V['sep_dia'])||0, t1=parseFloat(V['sep_t1'])||0, t2=parseFloat(V['sep_t2'])||0;
  var base=dia>0?dia:(t1+t2)>0?(t1+t2):0, altera=parseFloat(V['sep_altera'])||0;
  var pct=base>0?((altera/base)*100):null;
  var valEl=document.getElementById('sep_pct_val'), lblEl=document.getElementById('sep_pct_label');
  if(!valEl||!lblEl) return;
  if(pct===null){valEl.textContent='—';valEl.style.color='var(--i)';lblEl.textContent='—';lblEl.style.background='var(--c)';lblEl.style.color='var(--i)';return;}
  var cor=pct<=3?'#27500A':pct<=5?'#633806':'#791F1F';
  var bg=pct<=3?'#EAF3DE':pct<=5?'#FAEEDA':'#FCEBEB';
  var lbx=pct<=3?'✅ Ótimo':pct<=5?'⚠️ Atenção':'❌ Fora da meta';
  valEl.textContent=pct.toFixed(1)+'%'; valEl.style.color=cor;
  lblEl.textContent=lbx; lblEl.style.background=bg; lblEl.style.color=cor;
}

function calcPctConf() {
  var dia=parseFloat(V['conf_dia'])||0, t1=parseFloat(V['conf_t1'])||0, t2=parseFloat(V['conf_t2'])||0;
  var base=dia>0?dia:(t1+t2)>0?(t1+t2):0, erro=parseFloat(V['conf_erro'])||0;
  var pct=base>0?((erro/base)*100):null;
  var valEl=document.getElementById('conf_pct_val'), lblEl=document.getElementById('conf_pct_label');
  if(!valEl||!lblEl) return;
  if(pct===null){valEl.textContent='—';valEl.style.color='var(--i)';lblEl.textContent='—';lblEl.style.background='var(--c)';lblEl.style.color='var(--i)';return;}
  var cor=pct<=3?'#27500A':pct<=5?'#633806':'#791F1F';
  var bg=pct<=3?'#EAF3DE':pct<=5?'#FAEEDA':'#FCEBEB';
  var lbx=pct<=3?'✅ Ótimo':pct<=5?'⚠️ Atenção':'❌ Fora da meta';
  valEl.textContent=pct.toFixed(1)+'%'; valEl.style.color=cor;
  lblEl.textContent=lbx; lblEl.style.background=bg; lblEl.style.color=cor;
}

function rankBy(ids) {
  var vals=ids.map(function(id){var inp=document.getElementById('inp_'+id);return{id:id,v:inp?parseFloat(inp.value)||0:0};});
  var sorted=vals.slice().sort(function(a,b){return b.v-a.v;});
  var medals=['🥇 1º','🥈 2º','🥉 3º','4º','5º','6º','7º'];
  vals.forEach(function(item){
    var el=document.getElementById('rk_'+item.id); if(!el) return;
    var inp=document.getElementById('inp_'+item.id);
    if(!inp||!inp.value){el.textContent='';return;}
    el.textContent=medals[sorted.findIndex(function(s){return s.id===item.id;})]||'';
  });
}

function calcEqResumo() {
  var ids=['eq_anapaula','eq_cassiele','eq_gabriel','eq_isabela','eq_jessica','eq_joanna','eq_rebeka','eq_rodrigo','eq_vinicius'];
  var p=0,a=0,at=0;
  ids.forEach(function(id){
    var av=V['eq_assid_'+id]||'', uni=V['eq_uni_'+id]||'', con=V['eq_cond_'+id]||'';
    if(av==='Presente') p++; else if(av==='Ausente') a++; else if(av==='Atrasado') at++;
    var el=document.getElementById('prem_'+id);
    if(el){
      var eleg=av==='Presente'&&uni==='Conforme'&&con==='Conforme';
      var perdeu=av==='Atrasado'||av==='Ausente'||uni==='Nao conforme'||con==='Nao conforme';
      el.textContent=!av&&!uni&&!con?'—':eleg?'🏆 Elegível':'❌ Eliminado';
      el.style.background=!perdeu&&eleg?'#EAF3DE':perdeu?'#FCEBEB':'var(--w)';
      el.style.color=!perdeu&&eleg?'#27500A':perdeu?'#791F1F':'var(--i)';
    }
  });
  var ep=document.getElementById('eq_count_presente'), ea=document.getElementById('eq_count_ausente'), eat=document.getElementById('eq_count_atrasado');
  if(ep) ep.textContent=p>0?p:'—'; if(ea) ea.textContent=a>0?a:'—'; if(eat) eat.textContent=at>0?at:'—';
  calcPremiacaoOrg();
}

function calcPremiacaoOrg() {
  var el=document.getElementById('org_prem_lista'); if(!el) return;
  var pessoas=[{id:'eq_anapaula',nome:'Ana Paula'},{id:'eq_cassiele',nome:'Cassiele'},{id:'eq_gabriel',nome:'Gabriel'},{id:'eq_isabela',nome:'Isabela'},{id:'eq_jessica',nome:'Jéssica'},{id:'eq_joanna',nome:'Joanna'},{id:'eq_rebeka',nome:'Rebeca'},{id:'eq_rodrigo',nome:'Rodrigo'},{id:'eq_vinicius',nome:'Vinícius'}];
  var eliminados={};
  Object.keys(V).forEach(function(key){if(key.indexOf('_status')!==-1&&V[key]==='Não feito'){var resp=V[key.replace('_status','_resp')]||'';if(resp)eliminados[resp]=true;}});
  var html='';
  pessoas.forEach(function(p){
    var av=V['eq_assid_'+p.id]||'', uni=V['eq_uni_'+p.id]||'', con=V['eq_cond_'+p.id]||'';
    var tf=eliminados[p.nome], af=av==='Atrasado'||av==='Ausente';
    var perdeu=tf||af||uni==='Nao conforme'||con==='Nao conforme';
    var eleg=av==='Presente'&&uni==='Conforme'&&con==='Conforme'&&!tf;
    var bg2=eleg?'#EAF3DE':perdeu?'#FCEBEB':'var(--w)'; var cor2=eleg?'#27500A':perdeu?'#791F1F':'var(--i)';
    var motivo=[];
    if(av==='Atrasado')motivo.push('atraso'); if(av==='Ausente')motivo.push('falta');
    if(uni==='Nao conforme')motivo.push('uniforme'); if(con==='Nao conforme')motivo.push('conduta');
    if(tf)motivo.push('tarefa não feita');
    html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:.5px solid var(--bd);">';
    html+='<span style="font-size:13px;font-weight:500;">'+p.nome+'</span>';
    html+='<div style="display:flex;align-items:center;gap:8px;">';
    if(motivo.length) html+='<span style="font-size:11px;color:var(--i);opacity:.6;">'+motivo.join(', ')+'</span>';
    html+='<span style="font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px;background:'+bg2+';color:'+cor2+';">'+(eleg?'🏆 Elegível':'❌ Eliminado')+'</span>';
    html+='</div></div>';
  });
  el.innerHTML=html;
}

  Object.keys(V).forEach(function(key){if(key.indexOf('_status')!==-1&&V[key]==='Não feito'){var resp=V[key.replace('_status','_resp')]||'';if(resp)eliminados2[resp]=true;}});
  pessoas2.forEach(function(p){
    var av=V['eq_assid_'+p.id]||'',uni=V['eq_uni_'+p.id]||'',con=V['eq_cond_'+p.id]||'';
    var tf=eliminados2[p.nome],af=av==='Atrasado'||av==='Ausente';
    var perdeu=tf||af||uni==='Nao conforme'||con==='Nao conforme';
    var eleg=av==='Presente'&&uni==='Conforme'&&con==='Conforme'&&!tf;
    var bg2=eleg?'#EAF3DE':perdeu?'#FCEBEB':'var(--w)';var cor2=eleg?'#27500A':perdeu?'#791F1F':'var(--i)';
    var motivo=[];
    if(av==='Atrasado')motivo.push('atraso');if(av==='Ausente')motivo.push('falta');
    if(uni==='Nao conforme')motivo.push('uniforme');if(con==='Nao conforme')motivo.push('conduta');
    if(tf)motivo.push('tarefa não feita');
    html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:.5px solid var(--bd);">';
    html+='<span style="font-size:13px;font-weight:500;">'+p.nome+'</span>';
    html+='<div style="display:flex;align-items:center;gap:8px;">';
    if(motivo.length) html+='<span style="font-size:11px;color:var(--i);opacity:.6;">'+motivo.join(', ')+'</span>';
    html+='<span style="font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px;background:'+bg2+';color:'+cor2+';">'+(eleg?'🏆 Elegível':'❌ Eliminado')+'</span>';
    html+='</div></div>';
  });
  html+='</div></div>';
  html+='<p class="alerta-box">⚠️ <strong>Regra:</strong> tolerância zero — atraso, ausência, uniforme/conduta não conforme ou tarefa não feita elimina da premiação.</p>';
  return html;
}

function renderHistorico() {
  var secoes=['Recebimento','Separação','Conferência','Expedição','Equipe','Organização'];
  var html='<div class="sec-label" style="--slc:var(--v)">Registro de atividades</div>';
  html+='<div class="hist-filtros">';
  html+='<label>Setor:</label><select id="hf-secao" onchange="histFiltroSecao=this.value;carregarHistorico()"><option value="">Todos</option>';
  secoes.forEach(function(s){html+='<option value="'+s+'"'+(histFiltroSecao===s?' selected':'')+'>'+s+'</option>';});
  html+='</select>';
  html+='<label>Data:</label><input type="date" id="hf-data" value="'+(histFiltroData||dataAtual)+'" onchange="histFiltroData=this.value;carregarHistorico()">';
  html+='<button class="btn-lf" onclick="histFiltroSecao=\'\';histFiltroData=\'\';var s=document.getElementById(\'hf-secao\');var d=document.getElementById(\'hf-data\');if(s)s.value=\'\';if(d)d.value=\'\';carregarHistorico()">Limpar filtros</button>';
  html+='</div>';
  html+='<div class="hist-wrap">';
  html+='<div class="hist-head"><span>Data/Hora</span><span>Usuário</span><span>Setor</span><span>Campo</span><span>Alteração</span><span></span></div>';
  html+='<div id="hist-lista"><div class="hist-vazio">Carregando registros...</div></div>';
  html+='</div>';
  return html;
}

async function carregarHistorico() {
  var lista = document.getElementById('hist-lista');
  if (!lista) return;
  lista.innerHTML = '<div class="hist-vazio">Carregando...</div>';
  var query = sb.from('activity_log').select('*').is('excluido_em', null).order('ts', {ascending: false}).limit(300);
  if (histFiltroSecao) query = query.eq('secao', histFiltroSecao);
  if (histFiltroData) query = query.eq('data_ref', histFiltroData);
  var res = await query;
  histLogs = res.data || [];
  renderListaHistorico();
}

function renderListaHistorico() {
  var lista = document.getElementById('hist-lista');
  if (!lista) return;
  if (!histLogs.length) { lista.innerHTML = '<div class="hist-vazio">Nenhum registro encontrado.</div>'; return; }
  var html = '';
  histLogs.forEach(function(log) {
    var d = new Date(log.ts);
    var ts = String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    html += '<div class="hist-item" id="hlog-'+log.id+'">';
    html += '<span class="hist-ts">'+ts+'</span>';
    html += '<span class="hist-user">'+(log.user_nome||'—')+'</span>';
    html += '<span class="hist-secao">'+(log.secao||'—')+'</span>';
    html += '<span class="hist-campo">'+(log.campo_nome||log.campo_id||'—')+'</span>';
    html += '<span class="hist-change"><span class="hist-old">'+(log.valor_anterior||'—')+'</span><span class="hist-seta">→</span><span class="hist-new">'+(log.valor_novo||'—')+'</span></span>';
    html += '<button class="hist-del" title="Excluir registro (dedo gordo)" onclick="excluirLog(\''+log.id+'\')">✕</button>';
    html += '</div>';
  });
  lista.innerHTML = html;
}

// ─── IMPORT ───────────────────────────────────────────────────────────────────
function buildImportBtn(prefix,cor,bg,colPessoa){
  var html='<div class="setor-title" style="--stc:'+cor+'">📂 Importar dados do sistema</div>';
  html+='<div class="import-area">';
  html+='<label class="btn-imp">📁 Selecionar arquivo<input type="file" accept=".xlt,.xls,.xlsx,.csv,.txt" style="display:none;" onchange="importarArquivo(event,\''+prefix+'\',\''+colPessoa+'\')"></label>';
  html+='<span id="'+prefix+'_imp_status" style="font-size:12px;color:var(--i);opacity:.6;">Nenhum arquivo selecionado</span>';
  html+='<button class="btn-limpar" onclick="limparImport(\''+prefix+'\')">✕ Limpar</button>';
  html+='</div>';
  return html;
}

function buildImportTable(prefix,cor,bg){
  var rows=V[prefix+'_rows']||[];
  if(!rows.length) return '';
  var html='<div class="setor-title" style="--stc:'+cor+'">📋 Dados importados ('+rows.length+')</div>';
  html+='<div style="overflow-x:auto;border-radius:12px;border:1px solid var(--bd);margin-bottom:1.1rem;box-shadow:var(--sh);">';
  html+='<table style="border-collapse:collapse;font-size:12px;width:100%;"><thead><tr>';
  var cols=[];
  if(prefix==='sep') cols=[{h:'Código',k:'codigo'},{h:'Data',k:'data'},{h:'Separador',k:'separador'}];
  if(prefix==='conf') cols=[{h:'Código',k:'codigo'},{h:'Data',k:'data'},{h:'Conferente',k:'conferente'}];
  if(prefix==='exp') cols=[{h:'Código',k:'codigo'},{h:'Data',k:'data'},{h:'Entrega',k:'entrega'},{h:'Frete',k:'frete'},{h:'Cond. Pagamento',k:'condpag'},{h:'Situação',k:'situacao'}];
  cols.forEach(function(c,i){
    var rad=i===0?'border-radius:6px 0 0 0;':i===cols.length-1?'border-radius:0 6px 0 0;':'';
    html+='<th style="padding:8px 10px;background:'+cor+';color:#fff;font-weight:600;text-align:left;font-size:11px;'+rad+'">'+c.h+'</th>';
  });
  html+='</tr></thead><tbody>';
  rows.forEach(function(r,i){
    var rowBg=i%2===0?'var(--w)':bg;
    html+='<tr style="background:'+rowBg+';border-bottom:.5px solid var(--bd);">';
    cols.forEach(function(c){html+='<td style="padding:6px 10px;'+(c.k==='codigo'?'font-weight:600;')+'">'+((r[c.k])||'')+'</td>';});
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

function importarArquivo(event,prefix,colPessoa){
  var file=event.target.files[0]; if(!file) return;
  var statusEl=document.getElementById(prefix+'_imp_status');
  if(statusEl) statusEl.textContent='Lendo arquivo...';
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result; text=text.replace(/^﻿/,'');
    var lines=text.split(/\r?\n/).filter(function(l){return l.trim().length>0;});
    if(lines.length<2){if(statusEl)statusEl.textContent='Arquivo vazio ou sem dados.';return;}
    var firstLine=lines[0];
    var delim=firstLine.indexOf('\t')!==-1?'\t':firstLine.indexOf(';')!==-1?';':',';
    var headers=firstLine.split(delim).map(function(h){return h.replace(/"/g,'').trim();});
    function colIdx(names){for(var n=0;n<names.length;n++){var idx=headers.findIndex(function(h){return h.toLowerCase().replace(/\s/g,'').indexOf(names[n].toLowerCase().replace(/\s/g,''))!==-1;});if(idx!==-1)return idx;}return -1;}
    var iCod=colIdx(['digo','codigo']); if(iCod===-1) iCod=0;
    var iSit=colIdx(['itua','situacao']), iSep=colIdx(['eparador','separador']);
    var iData=-1; headers.forEach(function(h,idx){if(h.trim().toLowerCase()==='data') iData=idx;});
    var iConf=colIdx(['onferente','conferente']), iEnt=colIdx(['ntrega','entrega']);
    var iFrete=colIdx(['rete','frete']), iCond=colIdx(['ond. pag','ondpag','ond.pag','pagam']);
    var rows=[];
    for(var i=1;i<lines.length;i++){
      var f=lines[i].split(delim).map(function(c){return c.replace(/"/g,'').trim();});
      if(f.length<3||!f[iCod>0?iCod:0]) continue;
      rows.push({codigo:iCod>=0?f[iCod]:'',situacao:iSit>=0?f[iSit]:'',separador:iSep>=0?f[iSep]:'',data:iData>=0?f[iData].split(' ')[0]:'',conferente:iConf>=0?f[iConf]:'',entrega:iEnt>=0?f[iEnt]:'',frete:iFrete>=0?f[iFrete]:'',condpag:iCond>=0?f[iCond]:''});
    }
    V[prefix+'_rows']=rows;
    if(prefix==='sep'){
      setField('sep_dia',rows.length);
      var contSep={};
      rows.forEach(function(r){var nome=(r.separador||'').toLowerCase().trim();if(nome)contSep[nome]=(contSep[nome]||0)+1;});
      var mapSep={'ana paula':'sep_ana','ana paula bittencourt':'sep_ana','gabriel':'sep_gabriel','isabela':'sep_isabela','isabela brochier':'sep_isabela','joanna':'sep_joana','joanna rodrigues':'sep_joana'};
      Object.keys(mapSep).forEach(function(nome){var val=contSep[nome]||0;if(val>0)setField(mapSep[nome],val);});
      var sitAltera=['aguardando financeiro','cotação de frete','aguardando separação'];
      var altera=rows.filter(function(r){return sitAltera.some(function(s){return(r.situacao||'').toLowerCase().indexOf(s)!==-1;});}).length;
      if(altera>0) setField('sep_altera',altera);
      calcPctFaltas();
    }
    if(prefix==='conf'){
      var confRows=rows.filter(function(r){return(r.conferente||'').trim().length>0;});
      setField('conf_dia',confRows.length);
      var contConf={};
      confRows.forEach(function(r){var nome=(r.conferente||'').toLowerCase().trim();if(nome)contConf[nome]=(contConf[nome]||0)+1;});
      var mapConf={'rebeca':'conf_rebeka','rebeca da silveira':'conf_rebeka','cassiele':'conf_cassiele','cassiele lopes de castro':'conf_cassiele'};
      Object.keys(mapConf).forEach(function(nome){var val=contConf[nome]||0;if(val>0)setField(mapConf[nome],val);});
      calcPctConf();
    }
    if(prefix==='exp'){
      setField('exp_dia',rows.length);
      var contTrans={};
      rows.forEach(function(r){
        var ent=(r.entrega||'').toLowerCase();
        if(ent.indexOf('sao miguel')!==-1||ent.indexOf('são miguel')!==-1||ent.indexOf('expresso sao')!==-1||ent.indexOf('expresso são')!==-1)contTrans['saomiguel']=(contTrans['saomiguel']||0)+1;
        else if(ent.indexOf('boeng')!==-1)contTrans['boeng']=(contTrans['boeng']||0)+1;
        else if(ent.indexOf('azul')!==-1)contTrans['azul']=(contTrans['azul']||0)+1;
        else if(ent.indexOf('rodonaves')!==-1)contTrans['rodonaves']=(contTrans['rodonaves']||0)+1;
        else if(ent.indexOf('troca')!==-1)contTrans['troca']=(contTrans['troca']||0)+1;
        else if(ent.indexOf('sapiranga')!==-1||ent.indexOf('rapido')!==-1||ent.indexOf('rápido')!==-1)contTrans['sapiranga']=(contTrans['sapiranga']||0)+1;
        else if(ent.indexOf('soft')!==-1)contTrans['soft']=(contTrans['soft']||0)+1;
      });
      var mapTrans={saomiguel:'exp_saomiguel',boeng:'exp_boeng',azul:'exp_azul',rodonaves:'exp_rodonaves',troca:'exp_troca',sapiranga:'exp_sapiranga',soft:'exp_soft'};
      Object.keys(mapTrans).forEach(function(k){if(contTrans[k])setField(mapTrans[k],contTrans[k]);});
      setTimeout(function(){rankBy(['exp_saomiguel','exp_boeng','exp_azul','exp_rodonaves','exp_troca','exp_sapiranga','exp_soft']);},100);
    }
    if(statusEl) statusEl.textContent='✓ '+rows.length+' registros importados';
    agendarSalvar();
    logAtividade(prefix+'_import','',''+rows.length+' registros importados');
    setSetor(ativo);
    setTimeout(function(){
      if(prefix==='sep') rankBy(['sep_ana','sep_gabriel','sep_isabela','sep_joana']);
      if(prefix==='conf') rankBy(['conf_cassiele','conf_rebeka']);
    },100);
  };
  reader.readAsText(file,'UTF-8');
}

function setField(id,val){
  V[id]=val;
  var el=document.getElementById('inp_'+id);
  if(el) el.value=val;
}

function limparImport(prefix){
  V[prefix+'_rows']=null;
  var statusEl=document.getElementById(prefix+'_imp_status');
  if(statusEl) statusEl.textContent='Nenhum arquivo selecionado';
  agendarSalvar();
  setSetor(ativo);
}

var RENDERERS=[renderRecebimento,renderSeparacao,renderConferencia,renderExpedicao,renderEquipe,renderOrganizacao,renderHistorico];

function renderSummary(){
  var html='';
  SETORES.slice(0,6).forEach(function(s,i){
    html+='<div class="sum-card" style="--sc:'+s.cor+'" onclick="setSetor('+i+')">';
    html+='<div class="sum-icon" style="background:'+s.bg+'">'+s.icone+'</div>';
    html+='<div><div class="sum-nome">'+s.nome+'</div><div class="sum-status">'+(i===ativo?'Ativo':'Ver')+'</div></div></div>';
  });
  document.getElementById('summary-bar').innerHTML=html;
}

function renderTabs(){
  var html='';
  SETORES.forEach(function(s,i){
    html+='<button class="setor-tab'+(i===ativo?' active':'')+'" style="--stc:'+s.cor+';--stbg:'+s.bg+'" onclick="setSetor('+i+')">';
    html+=s.icone+' '+s.nome+'</button>';
  });
  document.getElementById('setor-tabs').innerHTML=html;
}

function renderPanel(){
  var html='';
  SETORES.forEach(function(s,i){
    html+='<div class="setor-panel'+(i===ativo?' active':'')+'" id="panel_'+i+'" style="--stc:'+s.cor+';--stbg:'+s.bg+';--slc:'+s.cor+'">';
    html+=RENDERERS[i]();
    html+='</div>';
  });
  document.getElementById('setores-container').innerHTML=html;
  if(ativo===6) carregarHistorico();
}

function setSetor(idx){
  ativo=idx;
  renderSummary(); renderTabs(); renderPanel();
}

function setPeriod(el){
  document.querySelectorAll('.period-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  periodoAtivo=el.textContent.trim();
  renderPanel();
}

function tick(){
  var n=new Date();
  document.getElementById('hora').textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('data-exib').textContent=n.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
}
