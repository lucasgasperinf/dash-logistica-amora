<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logística — Amora</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --v:#8B1A2B;--vd:#6B0F1F;--vs:#A93444;
  --o:#D4A24A;--os:#E8C57A;
  --c:#F5EFE0;--cd:#EBE0C8;--ch:#2A1A1C;--i:#4A3338;--n:#FBF7EE;--w:#FFFFFF;
  --ok:#5C8A3A;--warn:#C8862E;--alert:#B5341B;
  --bd:rgba(235,224,200,0.7);
  --sh:0 1px 2px rgba(42,26,28,.04),0 8px 24px -12px rgba(42,26,28,.12);
  --she:0 4px 12px rgba(42,26,28,.08),0 24px 48px -16px rgba(42,26,28,.18);
  --ff:'Fraunces',Georgia,serif;--fb:'Inter Tight',-apple-system,sans-serif;--fm:'JetBrains Mono','Courier New',monospace;
}
html,body{font-family:var(--fb);font-size:14px;background:var(--n);color:var(--ch);min-height:100vh;-webkit-font-smoothing:antialiased;}
/* LOGIN */
#tela-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--c);}
.login-card{width:360px;background:var(--w);border-radius:20px;padding:44px 36px;box-shadow:var(--she);border:1px solid var(--bd);}
.login-topo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px;}
.login-badge{width:58px;height:58px;background:var(--v);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:22px;font-weight:600;color:var(--o);}
.login-marca{font-family:var(--ff);font-size:24px;font-weight:500;color:var(--v);text-align:center;}
.login-setor{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--i);opacity:.55;text-align:center;}
.login-sub{font-size:12px;color:var(--i);opacity:.45;text-align:center;margin-bottom:24px;}
.campo{margin-bottom:14px;}
.campo label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--i);opacity:.6;margin-bottom:6px;}
.campo input{width:100%;padding:11px 13px;border:1px solid var(--cd);border-radius:9px;font-family:inherit;font-size:14px;background:var(--n);color:var(--ch);outline:none;transition:border-color .15s;}
.campo input:focus{border-color:var(--o);background:var(--w);}
.login-erro{font-size:12px;color:#B52845;background:#F5E8EE;padding:8px 12px;border-radius:8px;text-align:center;margin-bottom:12px;}
.btn-entrar{width:100%;padding:13px;background:var(--v);color:var(--w);font-family:inherit;font-size:14px;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:background .2s;margin-top:4px;}
.btn-entrar:hover{background:var(--vd);}
.btn-entrar:disabled{opacity:.65;cursor:wait;}
/* APP LAYOUT */
#app{display:grid;grid-template-columns:260px 1fr;min-height:100vh;}
.sidebar{background:linear-gradient(180deg,var(--vd) 0%,var(--v) 100%);color:var(--c);padding:0;position:sticky;top:0;height:100vh;overflow-y:auto;box-shadow:4px 0 24px -8px rgba(42,26,28,.2);display:flex;flex-direction:column;}
.sb-brand{padding:24px 24px 20px;border-bottom:1px solid rgba(245,239,224,.12);}
.sb-logo{display:flex;align-items:center;gap:10px;}
.sb-logo-badge{width:38px;height:38px;background:var(--o);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:16px;font-weight:600;color:var(--vd);flex-shrink:0;}
.sb-logo-title{font-family:var(--ff);font-size:20px;font-weight:500;color:var(--os);letter-spacing:-.01em;}
.sb-logo-sub{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,239,224,.5);margin-top:2px;}
.sb-sync{margin:10px 24px 0;padding:6px 10px;background:rgba(212,162,74,.15);border-radius:8px;font-size:10px;letter-spacing:.06em;color:var(--os);display:flex;align-items:center;gap:7px;}
.sb-sync .dot{width:6px;height:6px;border-radius:50%;background:var(--o);flex-shrink:0;}
.sb-date{margin:10px 24px 0;padding:8px 10px;background:rgba(0,0,0,.15);border-radius:8px;}
.sb-date-nav{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.sb-date-nav button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(245,239,224,.7);font-family:inherit;font-size:11px;padding:3px 8px;border-radius:6px;cursor:pointer;transition:all .15s;}
.sb-date-nav button:hover:not(:disabled){background:rgba(255,255,255,.15);color:var(--c);}
.sb-date-nav button:disabled{opacity:.3;cursor:default;}
.sb-date-label{font-family:var(--ff);font-size:12px;font-weight:500;color:var(--os);text-align:center;flex:1;}
.sb-nav{flex:1;padding:16px 12px;}
.sb-nav-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,239,224,.35);padding:12px 10px 6px;font-weight:600;}
.sb-nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:rgba(245,239,224,.72);font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;transition:background .15s,color .15s;}
.sb-nav-item:hover{background:rgba(245,239,224,.07);color:var(--c);}
.sb-nav-item.active{background:rgba(212,162,74,.18);color:var(--os);box-shadow:inset 3px 0 0 var(--o);}
.sb-nav-item .badge{margin-left:auto;background:var(--o);color:var(--vd);font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;font-family:var(--fm);}
.sb-user{padding:16px 20px;border-top:1px solid rgba(245,239,224,.1);display:flex;align-items:center;gap:10px;}
.sb-user-av{width:32px;height:32px;border-radius:50%;background:var(--o);color:var(--vd);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-user-name{font-size:12px;font-weight:600;color:var(--c);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-user-role{font-size:9px;color:rgba(245,239,224,.5);letter-spacing:.05em;}
.btn-sair{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(245,239,224,.6);font-family:inherit;font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer;transition:all .15s;flex-shrink:0;}
.btn-sair:hover{background:rgba(255,255,255,.15);color:var(--c);}
/* MAIN AREA */
.main-area{padding:28px 36px 48px;min-width:0;background:var(--n);}
.section{display:none;}.section.active{display:block;}
.sec-header{margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid var(--cd);}
.sec-title{font-family:var(--ff);font-size:28px;font-weight:500;color:var(--ch);letter-spacing:-.02em;line-height:1.1;}
.sec-title em{color:var(--v);font-style:italic;font-weight:400;}
.sec-sub{font-size:12px;color:var(--i);opacity:.6;margin-top:5px;}
.period-tabs{display:inline-flex;background:rgba(139,26,43,.07);border-radius:8px;padding:3px;gap:2px;margin-top:10px;}
.period-tab{padding:5px 14px;border-radius:6px;border:none;background:transparent;color:var(--i);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;opacity:.7;}
.period-tab.active{background:var(--v);color:var(--w);opacity:1;font-weight:600;}
/* KPI HERO */
.kpi-hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.kpi-hero-card{background:var(--w);border-radius:14px;padding:18px;box-shadow:var(--sh);border:1px solid var(--bd);position:relative;overflow:hidden;}
.kpi-hero-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--v));}
.kpi-hero-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--i);opacity:.55;font-weight:600;}
.kpi-hero-val{font-family:var(--ff);font-size:28px;font-weight:600;color:var(--ch);margin:6px 0 2px;letter-spacing:-.02em;line-height:1;}
.kpi-hero-unit{font-size:11px;color:var(--i);opacity:.5;}
.kpi-hero-trend{margin-top:8px;font-size:11px;}
/* KPI CARDS (existing) */
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--i);opacity:.55;margin:0 0 10px;padding-left:10px;border-left:3px solid var(--slc);}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:1.1rem;}
.kpi-card{background:var(--w);border:1px solid var(--bd);border-radius:12px;padding:16px;box-shadow:var(--sh);}
.kpi-tipo{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--i);opacity:.45;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.kpi-tipo::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ktc);flex-shrink:0;}
.kpi-nome{font-size:12px;color:var(--i);margin-bottom:9px;line-height:1.4;opacity:.8;}
.kpi-card input{font-family:var(--ff);font-size:28px;font-weight:500;color:var(--ch);width:100%;border:none;border-bottom:2px solid var(--bd);background:transparent;padding:0 0 3px;outline:none;transition:border-color .15s;}
.kpi-card input:focus{border-bottom-color:var(--ktc);}
.kpi-unit{font-size:11px;color:var(--i);opacity:.45;margin-top:5px;}
.setor-title{font-family:var(--ff);font-size:15px;font-weight:500;color:var(--stc);margin:1.25rem 0 .75rem;padding-left:12px;border-left:4px solid var(--stc);}
.rank-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.1rem;}
.rank-card{background:var(--w);border:1px solid var(--bd);border-radius:12px;padding:16px 12px;text-align:center;box-shadow:var(--sh);}
.rank-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin:0 auto 8px;}
.rank-nome{font-size:12px;color:var(--i);opacity:.7;margin-bottom:8px;font-weight:500;}
.rank-card input{font-family:var(--ff);font-size:26px;font-weight:500;color:var(--ch);width:80px;border:none;border-bottom:2px solid var(--bd);background:transparent;outline:none;text-align:center;}
.rank-unit{font-size:11px;color:var(--i);opacity:.45;margin-top:5px;}
.rank-pos{font-size:12px;font-weight:600;margin-top:6px;min-height:18px;}
.total-card{background:var(--w);border:1px solid var(--bd);border-top:3px solid var(--stc);border-radius:12px;padding:16px 18px;box-shadow:var(--sh);}
.total-val{font-family:var(--ff);font-size:34px;font-weight:500;}
.alerta-box{font-size:11px;color:var(--i);margin-top:8px;padding:8px 12px;background:var(--c);border-radius:8px;opacity:.75;}
/* EQUIPE */
.eq-table{width:100%;border-collapse:collapse;font-size:13px;}
.eq-table th{padding:10px 14px;text-align:center;color:var(--os);font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;background:var(--v);}
.eq-table th:first-child{text-align:left;border-radius:8px 0 0 0;}
.eq-table th:last-child{border-radius:0 8px 0 0;}
.eq-table td{padding:9px 14px;border-bottom:.5px solid var(--bd);}
.eq-table tr:nth-child(even) td{background:var(--n);}
.eq-table tr:nth-child(odd) td{background:var(--w);}
.eq-sel{font-family:inherit;font-size:12px;font-weight:600;border:1px solid var(--bd);border-radius:8px;padding:5px 9px;cursor:pointer;outline:none;transition:all .15s;}
.eq-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--v);background:var(--c);flex-shrink:0;}
.eq-resumo{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:1rem;}
.eq-cnt{background:var(--w);border:1px solid var(--bd);border-radius:12px;padding:14px 15px;text-align:center;box-shadow:var(--sh);}
.eq-cnt-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--i);opacity:.55;margin-bottom:6px;}
.eq-cnt-val{font-family:var(--ff);font-size:28px;font-weight:500;}
/* IMPORT */
.import-area{background:var(--w);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:1.1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:var(--sh);}
.btn-imp{display:inline-flex;align-items:center;gap:8px;background:var(--v);color:var(--w);padding:8px 18px;border-radius:99px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;border:none;transition:background .2s;}
.btn-imp:hover{background:var(--vd);}
.btn-limpar{padding:6px 13px;border:1px solid var(--bd);border-radius:99px;background:transparent;font-family:inherit;font-size:12px;cursor:pointer;color:var(--i);opacity:.6;transition:all .15s;}
.btn-limpar:hover{border-color:var(--v);color:var(--v);opacity:1;}
/* HISTÓRICO */
.hist-filtros{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.hist-filtros select,.hist-filtros input[type=date]{font-family:inherit;font-size:12px;padding:6px 10px;border:1px solid var(--bd);border-radius:8px;background:var(--w);color:var(--ch);outline:none;cursor:pointer;}
.hist-filtros label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.55;}
.btn-lf{padding:6px 12px;border:1px solid var(--bd);border-radius:8px;background:transparent;font-family:inherit;font-size:12px;cursor:pointer;color:var(--i);opacity:.6;transition:all .15s;}
.btn-lf:hover{border-color:var(--v);color:var(--v);opacity:1;}
.hist-wrap{background:var(--w);border:1px solid var(--bd);border-radius:12px;overflow:hidden;box-shadow:var(--sh);}
.hist-head{display:grid;grid-template-columns:120px 75px 105px 1fr 155px 34px;gap:8px;padding:9px 16px;background:var(--cd);border-bottom:1px solid var(--bd);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--i);opacity:.6;}
.hist-item{display:grid;grid-template-columns:120px 75px 105px 1fr 155px 34px;align-items:center;gap:8px;padding:10px 16px;border-bottom:.5px solid var(--bd);font-size:12px;transition:background .1s;}
.hist-item:last-child{border-bottom:none;}.hist-item:hover{background:var(--n);}
.hist-ts{color:var(--i);opacity:.55;font-size:11px;white-space:nowrap;}
.hist-user{font-weight:600;color:var(--v);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hist-secao{font-size:11px;font-weight:500;color:var(--i);}
.hist-campo{color:var(--i);opacity:.65;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hist-change{display:flex;align-items:center;gap:5px;font-size:11px;}
.hist-old{text-decoration:line-through;opacity:.45;}.hist-seta{opacity:.35;font-size:10px;}.hist-new{font-weight:600;color:var(--v);}
.hist-del{width:28px;height:28px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--i);opacity:.35;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;flex-shrink:0;}
.hist-del:hover{background:#FCEBEB;border-color:#791F1F;color:#791F1F;opacity:1;}
.hist-vazio{padding:48px;text-align:center;color:var(--i);opacity:.4;font-size:13px;}
/* CRUD TABLES (KA, OC, Estoque) */
.crud-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.btn-primary{background:var(--v);color:var(--w);border:none;padding:9px 18px;border-radius:99px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s;}
.btn-primary:hover{background:var(--vd);}
.btn-secondary{background:var(--w);color:var(--i);border:1px solid var(--bd);padding:7px 14px;border-radius:99px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;}
.btn-secondary:hover{border-color:var(--v);color:var(--v);}
.data-table{width:100%;border-collapse:separate;border-spacing:0 5px;font-size:12px;}
.data-table th{text-align:left;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--i);opacity:.55;font-weight:700;padding:4px 10px;}
.data-table td{background:var(--w);padding:10px;border-top:1px solid var(--cd);border-bottom:1px solid var(--cd);vertical-align:middle;}
.data-table tr td:first-child{border-left:1px solid var(--cd);border-radius:8px 0 0 8px;}
.data-table tr td:last-child{border-right:1px solid var(--cd);border-radius:0 8px 8px 0;}
.data-table tr:hover td{background:var(--c);}
.tag{display:inline-block;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:99px;font-weight:700;}
.tag-ok{background:rgba(92,138,58,.12);color:var(--ok);}
.tag-warn{background:rgba(200,134,46,.12);color:var(--warn);}
.tag-alert{background:rgba(181,52,27,.12);color:var(--alert);}
.tag-info{background:rgba(139,26,43,.1);color:var(--v);}
.tag-neutral{background:rgba(74,51,56,.07);color:var(--i);}
.tbl-btn{background:transparent;border:1px solid var(--bd);color:var(--i);padding:4px 10px;border-radius:6px;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;margin-right:4px;}
.tbl-btn:hover{border-color:var(--v);color:var(--v);}
.tbl-btn.danger:hover{border-color:#B5341B;color:#B5341B;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(42,26,28,.55);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--w);border-radius:18px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px -10px rgba(42,26,28,.4);animation:slideUp .2s;}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--cd);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:var(--ff);font-size:20px;font-weight:500;color:var(--ch);}
.modal-close{background:none;border:none;color:var(--i);cursor:pointer;font-size:22px;line-height:1;opacity:.5;}
.modal-close:hover{opacity:1;color:var(--v);}
.modal-body{padding:20px 24px;}
.modal-foot{padding:14px 24px;background:var(--n);border-radius:0 0 18px 18px;display:flex;justify-content:flex-end;gap:10px;}
.form-row{margin-bottom:13px;}
.form-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--i);opacity:.65;margin-bottom:5px;}
.form-input,.form-select{width:100%;padding:9px 11px;border:1px solid var(--cd);border-radius:8px;font-family:inherit;font-size:13px;color:var(--ch);background:var(--n);transition:border-color .15s;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--o);background:var(--w);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
/* ESTOQUE */
.est-upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.est-upload-card{background:var(--w);border:2px dashed var(--o);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;}
.est-upload-card:hover{background:rgba(212,162,74,.06);border-color:var(--v);}
.est-upload-icon{font-size:32px;margin-bottom:8px;}
.est-upload-label{font-family:var(--ff);font-size:15px;font-weight:500;color:var(--v);margin-bottom:4px;}
.est-upload-hint{font-size:11px;color:var(--i);opacity:.55;}
.est-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.est-kpi{background:var(--w);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;box-shadow:var(--sh);text-align:center;}
.est-kpi-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--i);opacity:.5;margin-bottom:6px;}
.est-kpi-val{font-family:var(--ff);font-size:26px;font-weight:600;color:var(--ch);}
.est-kpi-val.alert{color:var(--alert);}
.est-tabs{display:flex;gap:0;border-bottom:2px solid var(--cd);margin-bottom:16px;}
.est-tab{padding:8px 18px;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--i);opacity:.5;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
.est-tab.active{color:var(--v);opacity:1;border-bottom-color:var(--v);}

function calcPctFaltas(){
  var dia=parseFloat(V['sep_dia'])||0,t1=parseFloat(V['sep_t1'])||0,t2=parseFloat(V['sep_t2'])||0;
  var base=dia>0?dia:(t1+t2)>0?(t1+t2):0,altera=parseFloat(V['sep_altera'])||0,pct=base>0?((altera/base)*100):null;
  var valEl=document.getElementById('sep_pct_val'),lblEl=document.getElementById('sep_pct_label');if(!valEl||!lblEl)return;
  if(pct===null){valEl.textContent='—';valEl.style.color='var(--i)';lblEl.textContent='—';lblEl.style.background='var(--c)';lblEl.style.color='var(--i)';return;}

  valEl.textContent=pct.toFixed(1)+'%';valEl.style.color=cor;lblEl.textContent=pct<=3?'✅ Ótimo':pct<=5?'⚠️ Atenção':'❌ Fora da meta';lblEl.style.background=bg;lblEl.style.color=cor;

function rankBy(ids){
  var vals=ids.map(function(id){var inp=document.getElementById('inp_'+id);return{id:id,v:inp?parseFloat(inp.value)||0:0};});
  var sorted=vals.slice().sort(function(a,b){return b.v-a.v;});
  var medals=['🥇 1º','🥈 2º','🥉 3º','4º','5º','6º','7º'];
  vals.forEach(function(item){var el=document.getElementById('rk_'+item.id);if(!el)return;var inp=document.getElementById('inp_'+item.id);if(!inp||!inp.value){el.textContent='';return;}el.textContent=medals[sorted.findIndex(function(s){return s.id===item.id;})]||'';});
}
function calcEqResumo(){

async function carregarHistorico(){

function renderListaHistorico(){
  var lista=document.getElementById('hist-lista');if(!lista)return;

async function salvarOc(id){
  var numOc=document.getElementById('oc-num-oc').value.trim();
  var fornecedor=document.getElementById('oc-fornecedor').value.trim();
  var previsto=document.getElementById('oc-previsto').value||null;
  var status=document.getElementById('oc-status').value;
  var numNf=document.getElementById('oc-num-nf').value.trim();
  var chegada=document.getElementById('oc-chegada').value||null;
  var obs=document.getElementById('oc-obs').value.trim();
  var arqInput=document.getElementById('oc-arquivo');
  var arquivo_nome=null,arquivo_b64=null;
  if(arqInput&&arqInput.files&&arqInput.files[0]){
    var file=arqInput.files[0];
    if(file.size>2*1024*1024){alert('Arquivo muito grande (máx. 2MB).');return;}
    arquivo_nome=file.name;
    arquivo_b64=await new Promise(function(resolve){var r=new FileReader();r.onload=function(e){resolve(e.target.result);};r.readAsDataURL(file);});
  }
  var payload={user_id:usuarioAtual.id,user_nome:usuarioAtual.email.split('@')[0],num_oc:numOc,fornecedor:fornecedor,previsto:previsto,status:status,num_nf:numNf,data_chegada:chegada,obs:obs,updated_at:new Date().toISOString()};
  if(arquivo_nome)payload.arquivo_nome=arquivo_nome;
  if(arquivo_b64)payload.arquivo_b64=arquivo_b64;
  var res;
  if(id){res=await sb.from('recebimentos_oc').update(payload).eq('id',id);}
  else{res=await sb.from('recebimentos_oc').insert(payload);}
  if(res.error){alert('Erro ao salvar: '+res.error.message);return;}
  closeModal();loadOcNf();
}
async function deletarOc(id){
  if(!confirm('Excluir este registro OC × NF?'))return;
  await sb.from('recebimentos_oc').delete().eq('id',id);loadOcNf();
}
function downloadOcArq(id){
  var item=ocItems.find(function(i){return i.id===id;});

  var a=document.createElement('a');a.href=item.arquivo_b64;a.download=item.arquivo_nome||'arquivo';a.click();
}

function buildEnrichedCompras(){

  var estMap={},custoEstMap={};

  var periodoDias=parseFloat(V['compras_periodo']||129);

    var velMes=meses>0?qtdVendida/meses:0;

    var custoUnit=qtdVendida>0?parseFloat(r.custo_total||0)/qtdVendida:(custoEstMap[r.codigo]||0);
    var diasEstoque=(velMes>0&&estoqueAtual!==null&&estoqueAtual>0)?Math.round((estoqueAtual/velMes)*30.4):
                    (estoqueAtual!==null&&estoqueAtual<=0)?0:null;

    var fornecedor=parseFornNome(fornMap[r.codigo]||'');
    return {codigo:r.codigo,nome:r.nome,quantidade:qtdVendida,unidade:r.unidade,
      custo_total:parseFloat(r.custo_total||0),preco_total:parseFloat(r.preco_total||0),
      lucro_pct:parseFloat(r.lucro_pct||0),marg_pct:parseFloat(r.marg_pct||0),
      velMes:velMes,estoqueAtual:estoqueAtual,diasEstoque:diasEstoque,
      custoUnit:custoUnit,urgencia:urgencia,sugestao30:sugestao30,sugestao60:sugestao60,fornecedor:fornecedor};
  });
  var abcSorted=enriched.slice().sort(function(a,b){return b.preco_total-a.preco_total;});

function importarVendas(event){

      for(var i=0;i<Math.min(raw.length,5);i++){if((raw[i][0]||'').toString().toLowerCase().replace(/\s/g,'').indexOf('digo')!==-1){hIdx=i;break;}}
      var headers=raw[hIdx].map(function(c){return (c||'').toString().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');});
      function ci(names){for(var n=0;n<names.length;n++){var idx=headers.findIndex(function(h){return h.indexOf(names[n])!==-1;});if(idx!==-1)return idx;}return -1;}
      var iCod=ci(['digo','cod']);if(iCod===-1)iCod=0;
      var iNome=ci(['nome','descr']),iQty=ci(['quantidade','qty','qtd']),iUn=ci(['unidade','un']);
      var iCusto=ci(['custo_total','custo']),iPreco=ci(['pre_o_total','preco_total','pre']),iLucro=ci(['lucro']),iMarg=ci(['marg']);
      var rows=[];

        var f=raw[i];

        rows.push({codigo:cod,nome:nome,quantidade:qty,unidade:un,custo_total:custo,preco_total:preco,lucro_pct:lucro,marg_pct:marg});

// ── Parser XLS Itens por Fornecedor ──
function importarFornecedores(event){
  var file=event.target.files[0];if(!file)return;
  var statusEl=document.getElementById('forn_imp_status');if(statusEl)statusEl.textContent='Lendo arquivo...';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var arr=new Uint8Array(e.target.result);
      var wb=XLSX.read(arr,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var raw=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
      // Detectar linha de header
      var hIdx=0;
      for(var i=0;i<Math.min(raw.length,5);i++){if((raw[i][0]||'').toString().toLowerCase().replace(/\s/g,'').indexOf('digo')!==-1){hIdx=i;break;}}
      var headers=raw[hIdx].map(function(c){return(c||'').toString().toLowerCase().trim();});
      function ci(names){for(var n=0;n<names.length;n++){var idx=headers.findIndex(function(h){return h.indexOf(names[n])!==-1;});if(idx!==-1)return idx;}return-1;}
      var iCod=ci(['digo','cod']);if(iCod===-1)iCod=0;
      var iForn=ci(['fornecedor','forn']);
      var iData=ci(['data']);
      // Construir map: codigo → {forn, data} — fica com o mais recente
      var map={};
      for(var i=hIdx+1;i<raw.length;i++){
        var f=raw[i];
        var cod=(f[iCod]||'').toString().trim();
        if(!cod||!/^\d+$/.test(cod))continue;
        var forn=iForn>=0?(f[iForn]||'').toString().trim():'';
        var data=iData>=0?(f[iData]||'').toString().trim():'';
        if(!map[cod]||data>map[cod].data)map[cod]={forn:forn,data:data};
      }
      // Salvar só o nome do fornecedor por código
      var fornMap={};
      Object.keys(map).forEach(function(cod){fornMap[cod]=map[cod].forn;});
      V['forn_map']=fornMap;
      var total=Object.keys(fornMap).length;
      if(statusEl)statusEl.textContent='✓ '+total+' vínculos carregados';
      agendarSalvar();renderSecao('compras');
    }catch(err){if(statusEl)statusEl.textContent='❌ Erro: '+err.message;console.error(err);}
  };
  reader.readAsArrayBuffer(file);
}

    body+='<td style="padding:6px 10px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+r.nome+'">'+r.nome+'</td>';

    body+='<td style="padding:6px 10px;text-align:right;font-weight:700;">'+r.quantidade+'</td>';
    meses.forEach(function(m){

      body+='<td style="padding:6px 10px;text-align:right;">'+(est||'—')+'</td>';

async function loadEstoqueFromDB(){

async function uploadEstoque(event,deposito){
  var file=event.target.files[0];if(!file)return;
  var statusId=deposito==='amora_rs'?'upload-amora':'upload-boeng';
  var cardEl=document.getElementById(statusId);if(cardEl)cardEl.closest('.est-upload-card').querySelector('.est-upload-hint').textContent='Processando...';
  var reader=new FileReader();
  reader.onload=async function(e){
    var arr=new Uint8Array(e.target.result);
    var wb2=XLSX.read(arr,{type:'array',cellDates:true,dateNF:'dd/mm/yyyy'});
    var ws2=wb2.Sheets[wb2.SheetNames[0]];
    var aoa2=XLSX.utils.sheet_to_json(ws2,{header:1,raw:false,defval:'',dateNF:'dd/mm/yyyy'});
    var text=aoa2.map(function(r){return r.join('\t');}).join('\n');
    var lines=text.split(/\r?\n/).filter(function(l){return l.trim().length>0;});
    if(lines.length<2){alert('Arquivo vazio ou sem dados.');return;}
    var firstLine=lines[0];
    var delim=firstLine.indexOf('\t')!==-1?'\t':firstLine.indexOf(';')!==-1?';':',';
    var headers=firstLine.split(delim).map(function(h){return h.replace(/"/g,'').trim();});
    function colIdx(names){for(var n=0;n<names.length;n++){var idx=headers.findIndex(function(h){return h.toLowerCase().replace(/\s/g,'').indexOf(names[n].toLowerCase().replace(/\s/g,''))!==-1;});if(idx!==-1)return idx;}return -1;}
    var iCod=colIdx(['digo','codigo']);if(iCod===-1)iCod=0;
    var iNome=colIdx(['nome','descri','produto']);
    var iQtd=colIdx(['quantidade','qtde','qty','estoque']);
    var iUnd=colIdx(['unidade','und','un']);
    var iCusto=colIdx(['custo','preco','valor']);
    var iTotal=colIdx(['total','custo total']);
    var itens=[],totalItens=0,rupturas=0,valorTotal=0;
    for(var i=1;i<lines.length;i++){
      var f=lines[i].split(delim).map(function(c){return c.replace(/"/g,'').trim();});
      if(!f[iCod>0?iCod:0])continue;
      function pn(s){return parseFloat((s||'0').replace(/[R$\s]/g,'').replace(/\.(?=\d{3})/g,'').replace(',','.'))||0;}
      var qty=pn(iQtd>=0?f[iQtd]:'0');
      var custo=pn(iCusto>=0?f[iCusto]:'0');
      var ctotal=pn(iTotal>=0?f[iTotal]:'0')||custo*qty;
      itens.push({codigo:iCod>=0?f[iCod]:'',nome:iNome>=0?f[iNome]:'',quantidade:qty,unidade:iUnd>=0?f[iUnd]:'',custo:custo,custo_total:ctotal});
      totalItens++;if(qty<=0)rupturas++;valorTotal+=ctotal;
    }
    estoqueItens[deposito]=itens;estoqueInfo[deposito]={data_ref:hoje()};
    var payload={deposito:deposito,data_ref:hoje(),itens:itens,total_itens:totalItens,itens_ruptura:rupturas,valor_total:valorTotal,user_id:usuarioAtual.id};
    try{await sb.from('estoque_snapshot').upsert(payload,{onConflict:'deposito,data_ref'});}catch(err){console.warn('estoque save:',err);}
    estoqueDeposito=deposito;renderSecao('estoque');
  };
  reader.readAsArrayBuffer(file);
}

    outroRows.forEach(function(r){if(mapaThis[r.codigo]){var ts=mapaThis[r.codigo].tempo||0,tc=r.tempo||0,tot=ts+tc;overlap.push({codigo:r.codigo,tempoSep:ts,tempoConf:tc,total:tot,itens:r.itens,valor:r.total});}});
    overlap.sort(function(a,b){return b.total-a.total;});
    if(overlap.length>0){
      html+='<div class="setor-title" style="--stc:'+cor+'">🔄 Ciclo completo — Separação + Conferência ('+overlap.length+' pedidos rastreados)</div>';
      html+='<div style="overflow-x:auto;border-radius:12px;border:1px solid var(--bd);margin-bottom:1.1rem;box-shadow:var(--sh);">';
      html+='<table style="border-collapse:collapse;font-size:12px;width:100%;"><thead><tr>';
      ['Cód. Venda','Sep (min)','Conf (min)','Total ciclo','Itens','Valor'].forEach(function(h,i){var r=i===0?'border-radius:6px 0 0 0;':i===5?'border-radius:0 6px 0 0;':'';html+='<th style="padding:8px 10px;background:'+cor+';color:#fff;font-weight:600;text-align:left;font-size:11px;'+r+'">'+h+'</th>';});
      html+='</tr></thead><tbody>';
      overlap.slice(0,15).forEach(function(r,i){
        var pctSep=r.total>0?Math.round((r.tempoSep/r.total)*100):0;
        var rowBg=i%2===0?'var(--w)':bg;
        html+='<tr style="background:'+rowBg+';border-bottom:.5px solid var(--bd);">';
        html+='<td style="padding:6px 10px;font-weight:700;">'+r.codigo+'</td>';
        html+='<td style="padding:6px 10px;">'+r.tempoSep+' <span style="font-size:10px;opacity:.6;">('+pctSep+'%)</span></td>';
        html+='<td style="padding:6px 10px;">'+(r.tempoConf)+' <span style="font-size:10px;opacity:.6;">'+(100-pctSep)+'%</span></td>';
        html+='<td style="padding:6px 10px;font-weight:700;color:'+cor+';">'+r.total+' min</td>';
        html+='<td style="padding:6px 10px;">'+r.itens+'</td>';
        html+='<td style="padding:6px 10px;">'+r.valor+'</td>';
        html+='</tr>';
      });
      html+='</tbody></table>';
      if(overlap.length>0){var avgCiclo=(overlap.reduce(function(s,r){return s+r.total;},0)/overlap.length).toFixed(0);html+='<div style="padding:10px 12px;font-size:12px;color:var(--i);background:'+bg+';border-top:1px solid var(--bd);">Tempo médio de ciclo completo: <strong>'+avgCiclo+' min</strong> · Mostrando top 15 de '+overlap.length+' pedidos</div>';}
      html+='</div>';
    }
  }
  return html;
}

  if(prefix==='conf')cols=hasTempo?[{h:'Código',k:'codigo'},{h:'Data',k:'data'},{h:'Hora',k:'hora'},{h:'Tempo (min)',k:'tempo'},{h:'Itens',k:'itens'},{h:'Produtos',k:'produtos'}]:[{h:'Código',k:'codigo'},{h:'Data',k:'data'},{h:'Conferente',k:'conferente'}];
  if(prefix==='exp')cols=[{h:'Código',k:'codigo'},{h:'Data',k:'data'},{h:'Entrega',k:'entrega'},{h:'Frete',k:'frete'},{h:'Cond. Pagamento',k:'condpag'},{h:'Situação',k:'situacao'}];
  cols.forEach(function(c,i){var rad=i===0?'border-radius:6px 0 0 0;':i===cols.length-1?'border-radius:0 6px 0 0;':'';html+='<th style="padding:8px 10px;background:'+cor+';color:#fff;font-weight:600;text-align:left;font-size:11px;'+rad+'">'+c.h+'</th>';});
  html+='</tr></thead><tbody>';
  rows.forEach(function(r,i){var rowBg=i%2===0?'var(--w)':bg;html+='<tr style="background:'+rowBg+';border-bottom:.5px solid var(--bd);">';cols.forEach(function(c){html+='<td style="padding:6px 10px;'+(c.k==='codigo'?'font-weight:600;':'')+'">'+((r[c.k])||'')+'</td>';});html+='</tr>';});
  html+='</tbody></table></div>';return html;
}
function importarArquivo(event,prefix,colPessoa){
  var file=event.target.files[0];if(!file)return;
  var statusEl=document.getElementById(prefix+'_imp_status');if(statusEl)statusEl.textContent='Lendo arquivo...';
  var reader=new FileReader();
  reader.onload=function(e){
    var arr=new Uint8Array(e.target.result);
    var wb2=XLSX.read(arr,{type:'array',cellDates:true,dateNF:'dd/mm/yyyy'});
    var ws2=wb2.Sheets[wb2.SheetNames[0]];
    var aoa2=XLSX.utils.sheet_to_json(ws2,{header:1,raw:false,defval:'',dateNF:'dd/mm/yyyy'});
    var text=aoa2.map(function(r){return r.join('\t');}).join('\n');
    var lines=text.split(/\r?\n/).filter(function(l){return l.trim().length>0;});
    if(lines.length<2){if(statusEl)statusEl.textContent='Arquivo vazio.';return;}
    // ── Detectar relatório de tempo Amora ──────────────────────────────────
    var isTempoRel=(prefix==='sep'||prefix==='conf')&&lines[0]&&lines[0].toUpperCase().indexOf('AMORA')!==-1&&lines.length>4;
    if(isTempoRel){
      var pessoa='';
      if(lines[1]&&lines[1].indexOf(':')!==-1)pessoa=lines[1].split(':').slice(1).join(':').trim();
      // Linha 3 = headers (0=empresa,1=pessoa,2=período → idx 3 após filtro de vazios)
      var hdrLine=lines[3]||'';
      var d2=hdrLine.indexOf('\t')!==-1?'\t':hdrLine.indexOf(';')!==-1?';':',';
      var hdrs=hdrLine.split(d2).map(function(h){return h.replace(/"/g,'').trim();});
      function ci2(ns){for(var n=0;n<ns.length;n++){var x=hdrs.findIndex(function(h){return h.toLowerCase().indexOf(ns[n].toLowerCase())!==-1;});if(x!==-1)return x;}return -1;}
      var iCod2=ci2(['cód venda','cod venda','cód','código']);if(iCod2<0)iCod2=0;
      var iDtV=ci2(['data venda']),iHrV=ci2(['hora venda']);
      var iItens=ci2(['itens']),iProds=ci2(['produtos']),iTotal=ci2(['total']);
      var iTempo=ci2(['tempo']);
      function parsePtBR(s){return parseFloat((s||'').replace(/R\$\s*/,'').replace(/\./g,'').replace(',','.'))||0;}
      var rows2=[];
      for(var ii=4;ii<lines.length;ii++){
        var ff=lines[ii].split(d2).map(function(c){return c.replace(/"/g,'').trim();});
        var cod2=ff[iCod2]||'';
        // Pular linhas de rodapé do ERP (ex: "Totais Geral", "Vendas", ...) — somente código numérico é dado real
        if(!cod2||!/^\d+$/.test(cod2))continue;
        var tempoVal=iTempo>=0?parsePtBR(ff[iTempo]):0;
        var itensVal=iItens>=0?parsePtBR(ff[iItens]):0;
        var prodsVal=iProds>=0?parsePtBR(ff[iProds]):0;
        rows2.push({codigo:cod2,data:iDtV>=0?ff[iDtV]:'',hora:iHrV>=0?ff[iHrV]:'',tempo:tempoVal,itens:itensVal,produtos:prodsVal,total:iTotal>=0?ff[iTotal]:''});
      }
      // ── Calcular indicadores ──
      var tempos2=rows2.map(function(r){return r.tempo;}).filter(function(t){return t>0;});
      var tmedCalc=tempos2.length>0?tempos2.reduce(function(a,b){return a+b;},0)/tempos2.length:0;
      var itensTotal2=rows2.reduce(function(s,r){return s+r.itens;},0);
      var prodTotal2=rows2.reduce(function(s,r){return s+r.produtos;},0);
      var valorTotal2=rows2.reduce(function(s,r){return s+parsePtBR(r.total);},0);
      var rapido2=rows2.filter(function(r){return r.tempo>0&&r.tempo<5;}).length;
      var normal2=rows2.filter(function(r){return r.tempo>=5&&r.tempo<=15;}).length;
      var lento2=rows2.filter(function(r){return r.tempo>15;}).length;
      var t1c=0,t2c=0;
      rows2.forEach(function(r){var h=parseInt((r.hora||'00:00').split(':')[0]);if(h>=6&&h<14)t1c++;else if(h>=14&&h<22)t2c++;});
      var sorted2=rows2.slice().sort(function(a,b){return b.tempo-a.tempo;});
      var top5calc=sorted2.slice(0,5).map(function(r){return{codigo:r.codigo,tempo:r.tempo,itens:r.itens,produtos:r.produtos,total:r.total};});
      // ── Persistir em V ──
      V[prefix+'_pessoa']=pessoa;
      V[prefix+'_tmed_calc']=tmedCalc.toFixed(2);
      V[prefix+'_itens_total']=Math.round(itensTotal2);
      V[prefix+'_prod_total']=Math.round(prodTotal2);
      V[prefix+'_valor_total']=valorTotal2.toFixed(2);
      V[prefix+'_faixa_rapido']=rapido2;
      V[prefix+'_faixa_normal']=normal2;
      V[prefix+'_faixa_lento']=lento2;
      V[prefix+'_turno1']=t1c;
      V[prefix+'_turno2']=t2c;
      V[prefix+'_top5']=top5calc;
      V[prefix+'_rows']=rows2;
      // ── Análises avançadas ─────────────────────────────────────────────
      // 1. Tempo por item (min/item normalizado)
      var rowsCI=rows2.filter(function(r){return r.itens>0;});
      var tpiCalc=rowsCI.length>0?rowsCI.reduce(function(s,r){return s+(r.tempo/r.itens);},0)/rowsCI.length:0;
      // 2. Anomalos: min/item > 3× média (pedidos com comportamento fora do padrão)
      var anomalos2=rows2.filter(function(r){return r.itens>0&&(r.tempo/r.itens)>(tpiCalc*3);}).map(function(r){return{codigo:r.codigo,tempo:r.tempo,itens:r.itens,tpi:parseFloat((r.tempo/r.itens).toFixed(1)),total:r.total};});
      // 3. Evolução diária: pedidos, tmed, T1, T2 por data
      var evolMap={};
      rows2.forEach(function(r){var d=r.data||'?';if(!evolMap[d])evolMap[d]={pedidos:0,tempoSum:0,t1:0,t2:0};evolMap[d].pedidos++;evolMap[d].tempoSum+=r.tempo;var h=parseInt((r.hora||'00:00').split(':')[0]);if(h>=6&&h<14)evolMap[d].t1++;else if(h>=14&&h<22)evolMap[d].t2++;});
      var evolucao2=Object.keys(evolMap).sort().map(function(d){return{data:d,pedidos:evolMap[d].pedidos,tmed:evolMap[d].pedidos>0?parseFloat((evolMap[d].tempoSum/evolMap[d].pedidos).toFixed(1)):0,t1:evolMap[d].t1,t2:evolMap[d].t2};});
      V[prefix+'_tpi']=tpiCalc.toFixed(2);
      V[prefix+'_anomalos']=anomalos2;
      V[prefix+'_evolucao']=evolucao2;
      if(prefix==='sep'){setField('sep_dia',rows2.length);setField('sep_tmed',parseFloat(tmedCalc.toFixed(1)));calcPctFaltas();}
      if(prefix==='conf'){setField('conf_dia',rows2.length);setField('conf_tmed',parseFloat(tmedCalc.toFixed(1)));calcPctConf();}
      if(statusEl)statusEl.textContent='✓ '+rows2.length+' pedidos — relatório Amora';
      agendarSalvar();logAtividade(prefix+'_import','',rows2.length+' pedidos (relatório tempo)');
      renderSecao(ativo);
      return;
    }
    // ── Parser genérico (CSV / exportações ERP) ──────────────────────────
    var firstLine=lines[0];var delim=firstLine.indexOf('\t')!==-1?'\t':firstLine.indexOf(';')!==-1?';':',';
    var headers=firstLine.split(delim).map(function(h){return h.replace(/"/g,'').trim();});
    function colIdx(names){for(var n=0;n<names.length;n++){var idx=headers.findIndex(function(h){return h.toLowerCase().replace(/\s/g,'').indexOf(names[n].toLowerCase().replace(/\s/g,''))!==-1;});if(idx!==-1)return idx;}return -1;}
    var iCod=colIdx(['digo','codigo']);if(iCod===-1)iCod=0;
    var iSit=colIdx(['itua','situacao']),iSep=colIdx(['eparador','separador']);
    var iData=-1;headers.forEach(function(h,idx){if(h.trim().toLowerCase()==='data')iData=idx;});
    var iConf=colIdx(['onferente','conferente']),iEnt=colIdx(['ntrega','entrega']);
    var iFrete=colIdx(['rete','frete']),iCond=colIdx(['ond. pag','ondpag','ond.pag','pagam']);
    var rows=[];
    for(var i=1;i<lines.length;i++){var f=lines[i].split(delim).map(function(c){return c.replace(/"/g,'').trim();});if(f.length<3||!f[iCod>0?iCod:0])continue;rows.push({codigo:iCod>=0?f[iCod]:'',situacao:iSit>=0?f[iSit]:'',separador:iSep>=0?f[iSep]:'',data:iData>=0?f[iData].split(' ')[0]:'',conferente:iConf>=0?f[iConf]:'',entrega:iEnt>=0?f[iEnt]:'',frete:iFrete>=0?f[iFrete]:'',condpag:iCond>=0?f[iCond]:'',});}
    V[prefix+'_rows']=rows;
    if(prefix==='sep'){setField('sep_dia',rows.length);var contSep={};rows.forEach(function(r){var nome=(r.separador||'').toLowerCase().trim();if(nome)contSep[nome]=(contSep[nome]||0)+1;});var mapSep={'ana paula':'sep_ana','ana paula bittencourt':'sep_ana','gabriel':'sep_gabriel','isabela':'sep_isabela','isabela brochier':'sep_isabela','joanna':'sep_joana','joanna rodrigues':'sep_joana'};Object.keys(mapSep).forEach(function(nome){var val=contSep[nome]||0;if(val>0)setField(mapSep[nome],val);});var sitAltera=['aguardando financeiro','cotação de frete','aguardando separação'];var altera=rows.filter(function(r){return sitAltera.some(function(s){return(r.situacao||'').toLowerCase().indexOf(s)!==-1;});}).length;if(altera>0)setField('sep_altera',altera);calcPctFaltas();}
    if(prefix==='conf'){var confRows=rows.filter(function(r){return(r.conferente||'').trim().length>0;});setField('conf_dia',confRows.length);var contConf={};confRows.forEach(function(r){var nome=(r.conferente||'').toLowerCase().trim();if(nome)contConf[nome]=(contConf[nome]||0)+1;});var mapConf={'rebeca':'conf_rebeka','rebeca da silveira':'conf_rebeka','cassiele':'conf_cassiele','cassiele lopes de castro':'conf_cassiele'};Object.keys(mapConf).forEach(function(nome){var val=contConf[nome]||0;if(val>0)setField(mapConf[nome],val);});calcPctConf();}
    if(prefix==='exp'){setField('exp_dia',rows.length);var contTrans={};rows.forEach(function(r){var ent=(r.entrega||'').toLowerCase();if(ent.indexOf('sao miguel')!==-1||ent.indexOf('são miguel')!==-1)contTrans['saomiguel']=(contTrans['saomiguel']||0)+1;else if(ent.indexOf('boeng')!==-1)contTrans['boeng']=(contTrans['boeng']||0)+1;else if(ent.indexOf('azul')!==-1)contTrans['azul']=(contTrans['azul']||0)+1;else if(ent.indexOf('rodonaves')!==-1)contTrans['rodonaves']=(contTrans['rodonaves']||0)+1;else if(ent.indexOf('troca')!==-1)contTrans['troca']=(contTrans['troca']||0)+1;else if(ent.indexOf('sapiranga')!==-1||ent.indexOf('rapido')!==-1||ent.indexOf('rápido')!==-1)contTrans['sapiranga']=(contTrans['sapiranga']||0)+1;else if(ent.indexOf('soft')!==-1)contTrans['soft']=(contTrans['soft']||0)+1;});var mapTrans={saomiguel:'exp_saomiguel',boeng:'exp_boeng',azul:'exp_azul',rodonaves:'exp_rodonaves',troca:'exp_troca',sapiranga:'exp_sapiranga',soft:'exp_soft'};Object.keys(mapTrans).forEach(function(k){if(contTrans[k])setField(mapTrans[k],contTrans[k]);});setTimeout(function(){rankBy(['exp_saomiguel','exp_boeng','exp_azul','exp_rodonaves','exp_troca','exp_sapiranga','exp_soft']);},100);}
    if(statusEl)statusEl.textContent='✓ '+rows.length+' registros importados';
    agendarSalvar();logAtividade(prefix+'_import','',''+rows.length+' registros importados');
    renderSecao(ativo);
    setTimeout(function(){if(prefix==='sep')rankBy(['sep_ana','sep_gabriel','sep_isabela','sep_joana']);if(prefix==='conf')rankBy(['conf_cassiele','conf_rebeka']);},100);
  };
  reader.readAsArrayBuffer(file);
}
function setField(id,val){V[id]=val;var el=document.getElementById('inp_'+id);if(el)el.value=val;}
function limparImport(prefix){V[prefix+'_rows']=null;['_tmed_calc','_itens_total','_prod_total','_valor_total','_faixa_rapido','_faixa_normal','_faixa_lento','_turno1','_turno2','_top5','_pessoa','_tpi','_anomalos','_evolucao'].forEach(function(k){delete V[prefix+k];});var statusEl=document.getElementById(prefix+'_imp_status');if(statusEl)statusEl.textContent='Nenhum arquivo selecionado';agendarSalvar();renderSecao(ativo);}
